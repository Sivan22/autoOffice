name: Build and Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compute production URL
        id: url
        shell: pwsh
        run: |
          $owner = "${{ github.repository_owner }}"
          $repo  = "${{ github.event.repository.name }}"
          $base  = "/$repo/"
          $url   = "https://$owner.github.io$base"
          "base=$base"  >> $env:GITHUB_OUTPUT
          "url=$url"    >> $env:GITHUB_OUTPUT

      - name: Build
        run: npm run build
        env:
          VITE_BASE: ${{ steps.url.outputs.base }}

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true

      - name: Update manifest URLs for production
        shell: pwsh
        run: |
          $m = Get-Content manifest.xml -Raw
          $m = $m -replace 'https://localhost:3721/', '${{ steps.url.outputs.url }}'
          $m = $m -replace 'https://github.com/user/autooffice', 'https://github.com/${{ github.repository }}'
          Set-Content manifest.xml $m -Encoding UTF8

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis --no-progress -y

      - name: Copy manifest for installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path installer\files | Out-Null
          Copy-Item manifest.xml installer\files\manifest.xml

      - name: Build installer
        shell: pwsh
        run: '& "C:\Program Files (x86)\NSIS\makensis.exe" installer\autooffice.nsi'

      - name: Delete existing latest release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --yes --cleanup-tag || true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          prerelease: true
          body: |
            Auto-built from `${{ github.sha }}`.

            ## Install
            1. Download **AutoOffice-Setup.exe** and run it.
            2. Restart Microsoft Word.
            3. Go to **Insert → Add-ins → My Add-ins → Shared Folder**.
            4. Select **AutoOffice** and click **Add**.

            The add-in is served from GitHub Pages — no local server needed.
          files: installer/AutoOffice-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
