<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
</head>
<body>
<script>
  Office.onReady(function () {
    window.addEventListener('message', function (event) {
      var data = event.data;
      if (!data || data.type !== 'execute' || !data.id) return;

      var id = data.id;
      var code = data.code;

      // Wrap code in Word.run if it's just the inner body
      var isWrapped = code.trim().startsWith('Word.run');
      var execCode;
      if (isWrapped) {
        execCode = code;
      } else {
        execCode = 'return Word.run(async function(context) {\n' + code + '\n});';
      }

      try {
        var fn = new Function(execCode);
        var result = fn();

        // Handle both sync and async results
        if (result && typeof result.then === 'function') {
          result.then(function (output) {
            parent.postMessage({ type: 'result', id: id, success: true, output: output }, '*');
          }).catch(function (err) {
            parent.postMessage({
              type: 'error',
              id: id,
              success: false,
              error: err.message || String(err),
              stack: err.stack || ''
            }, '*');
          });
        } else {
          parent.postMessage({ type: 'result', id: id, success: true, output: result }, '*');
        }
      } catch (err) {
        parent.postMessage({
          type: 'error',
          id: id,
          success: false,
          error: err.message || String(err),
          stack: err.stack || ''
        }, '*');
      }
    });

    // Signal ready
    parent.postMessage({ type: 'sandbox-ready' }, '*');
  });
</script>
</body>
</html>
